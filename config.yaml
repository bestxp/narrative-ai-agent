# ============================================================================
# Lazy Universe Bot — runtime configuration
# ----------------------------------------------------------------------------
# Каждая секция снабжена комментарием, описывающим её назначение. Парсер
# игнорирует YAML-комментарии; подсказки нужны только человеку, который
# правит этот файл.
# ============================================================================

# ----------------------------------------------------------------------------
# messaging: транспорты, через которые бот общается с игроком.
# Сейчас активен только Telegram, но архитектура допускает подключение
# Discord / web / CLI без правок в коде — достаточно добавить sibling-поле
# в MessagingConfig (см. internal/config/config.go).
# ----------------------------------------------------------------------------
messaging:
  telegram:
    # BotFather-issued token. Секрет, не коммитить в публичный репозиторий.
    token: "REPLACE_WITH_BOTFATHER_TOKEN"
    # Long-poll длительность для GetUpdates, секунды. 30-90 — комфортный диапазон.
    polling_timeout: 60
    # Режим парсинга сообщений: "" (plain), "MarkdownV2", "HTML".
    # По умолчанию — HTML: нативный для Telegram, прощает опечатки
    # вроде лишних `_*[]().` в русской прозе, которые ломают MarkdownV2.
    # Бот автоматически конвертирует LLM-emitted Markdown
    # (**bold**, *italic*, `code`, [text](url)) в <b>/<i>/<code>/<a>.
    parse_mode: "HTML"
    # Whitelist Telegram user_id. Сообщения от всех, кто не в списке, дропаются. @userinfobot
    allowed_user_ids:
      - 123456789
    # reply_to_user: каждое сообщение бота (нарратив, /команды)
    # шлётся как reply на сообщение игрока — чат выглядит как
    # thread. Уведомления (auto-save ✅, compaction 🔄, ошибки ⚠️)
    # идут отдельными bubble'ами (без reply) чтобы не путать
    # с нарративом.
    reply_to_user: true

# ----------------------------------------------------------------------------
# paths: где бот хранит данные и в каком каталоге выполняет git-команды.
# Относительные пути резолвятся относительно директории этого YAML-файла.
# ----------------------------------------------------------------------------
paths:
  data_root: "game-data"   # Корень: info.yaml, characters/, worlds/
  git_workdir: "."         # Где запускать git add/commit/push

# ----------------------------------------------------------------------------
# git: параметры локального коммита и синхронизации с remote. Скилл требует
# "git add -A && commit && pull --rebase && push" после каждого обслуживания.
# ----------------------------------------------------------------------------
git:
  remote: "origin"                  # Имя remote
  branch: "master"                  # Рабочая ветка
  commit_author: "Lazy Universe Bot"
  commit_email: "bot@lazy-universe.local"
  # remote_disabled: true — локальный режим: коммиты пишутся, push/pull пропускаются.
  # Удобно для разработки на одной машине и для бэкапа без облака.
  # По умолчанию false (push включён — канонический flow lazy-universe).
  remote_disabled: false
  # auto-save: бот сам коммитит каждые N ответов и шлёт уведомление.
  # after_messages: 0 — выключено (только /save и неявные после /endday, /leave).
  # По умолчанию 5: один полный цикл сцена = одно сохранение.
  auto_save:
    after_messages: 5
  # verbose_save: расширенный формат "✅ сохранено (3 файла, +412 байт)".
  # По умолчанию false — короткая строка "✅ сохранено: commit abc1234".
  verbose_save: false

# ----------------------------------------------------------------------------
# narrative: поведенческая обёртка GM — лимит слов и язык ответов.
# ----------------------------------------------------------------------------
narrative:
  # Мягкий лимит на размер поля `narration` в JSON-режиме
  # (или блока "диалоги и действия" в markdown). 250 слов —
  # комфортный потолок для 2-3 абзацев нарратива. В
  # narrative.md жёсткий лимит 150, GM-валидатор использует
  # это число при проверке.
  word_limit: 250
  language: "ru"    # Язык, на котором GM пишет
  # rules_check_block: показывать ли игроку LLM-генерируемый блок
  # "**ВАЛИДАЦИЯ ПРАВИЛ**" (лимит слов, NPC isolation, обновлённые файлы).
  # LLM по-прежнему пишет его — промпт не меняется, флаг только
  # стрипает блок на выходе. Default false: production-режим.
  # Подробное обоснование — в README.md, секция "rules_check_block".
  rules_check_block: false
  # compaction_notify: слать ли игроку уведомление когда бот
  # дропнул старые turn'ы чтобы уложиться в context_window.
  # Сообщение идёт ОТДЕЛЬНЫМ bubble'ом (не reply) чтобы не
  # путать с нарративом. Default true.
  compaction_notify: true
  # compaction_notify_verbose: вместо одной строки "🔄 22k → 5k"
  # давать многострочную разбивку с before/after/dropped/kept.
  compaction_notify_verbose: false
  # include_system_state_in_prompt: отдавать ли LLM сводку
  # system_state.md (компакции, last autosave hash). Default false —
  # это операторский диагностический файл, в промпт не нужен.
  include_system_state_in_prompt: false

# ----------------------------------------------------------------------------
# llm: реестр LLM-ролей. Каждая роль — отдельная задача со своей моделью
# и system prompt. Сейчас активна только "narrative" (GM); позже появятся
# "summary" (дешёвая модель для сжатия NPC-файлов), "classification"
# (выбор tool'а) и т.д. — для каждой свой набор параметров.
# ----------------------------------------------------------------------------
llm:
  # Default timeout для всех ролей, которые не указали свой.
  default_timeout_seconds: 120
  # token_tracking: подсчёт токенов в каждом запросе/ответе.
  #   "off"      — не считать
  #   "estimate" — грубо: len(text) / 4 (работает на любом API)
  #   "usage"    — брать usage из ответа провайдера; если его нет —
  #                fallback в estimate + warn в slowlog
  #
  # С openai-драйвером и stream_options.include_usage=true
  # (wire default) Ollama Cloud шлёт usage на последнем chunk
  # → "usage" даёт точные цифры. Legacy driver без
  # include_usage → usage пустой, fallback в estimate.
  # Текущее значение "estimate" — универсальный safe default,
  # можно переключить на "usage" после проверки slow.log.
  token_tracking: "estimate"
  # include_in_reply: дописать "🔢 ~123 tok" в конец ответа GM.
  # Независимо от этого slowlog всё равно пишет фактические числа.
  include_in_reply: true
  # driver: какую реализацию LLM-клиента использовать.
  #   "legacy" — самописный HTTP+JSON клиент в internal/adapter/llm.
  #              Default; без structured output, markdown-режим.
  #   "openai"  — openai-go v3 SDK (internal/adapter/llm/openai).
  #               Поддерживает strict tools, response_format,
  #               reasoning_effort, include_usage streaming.
  #               Включает автоматический structured output для
  #               4-блочного narrative (narration/context/future/validation)
  #               через response_format=json_object.
  #               Требует narrative.md с описанием JSON-формата
  #               (Режим A в начале файла).
  # Обе реализации совместимы по wire-формату; переключение в одно поле.
  driver: "openai"
  # structured_output: режим структурированного вывода для openai-драйвера.
  # legacy-драйвер игнорирует эту секцию.
  #
  # Режимы (выбрано по результатам probe на https://ollama.com/v1
  # на 3 моделях — см. cmd/test-openapi):
  #
  #   "off"        — НЕ использовать response_format. Модель пишет
  #                  markdown как раньше. Fallback для провайдеров
  #                  без поддержки JSON mode.
  #
  #   "json_object" — response_format.type="json_object". Модель
  #                  выдаёт чистый JSON-объект с 4 полями
  #                  (narration/context/future/validation),
  #                  описанными в system prompt. **РАБОТАЕТ
  #                  стабильно** на Ollama Cloud (minimax-m3:cloud
  #                  и nemotron-3-ultra:cloud) — модель следует
  #                  инструкциям из system prompt, выдаёт чистый
  #                  JSON без fence wrap. GM парсит ответ
  #                  (internal/structured) и рендерит в тот же
  #                  4-блочный markdown, что и legacy. Игрок не
  #                  видит разницы в форматировании.
  #
  #   "json_schema" — response_format с strict json_schema.
  #                  **НЕ РАБОТАЕТ** на Ollama Cloud
  #                  (minimax-m3:cloud / nemotron-3-ultra:cloud) —
  #                  модель игнорирует schema, придумывает
  #                  свою ("title"/"setting"/"characters"/...),
  #                  иногда оборачивает в ```json fence.
  #                  Будет работать на OpenAI strict mode
  #                  (gpt-4o-2024-08-06+) и OpenRouter strict
  #                  — оставлено для будущей миграции провайдера.
  #
  # tool_choice / strict_tools: подтверждено работает на
  # minimax-m3:cloud (probe H2 + H5, 2026-06-08, см.
  # cmd/test-openapi). Модель возвращает валидные tool_calls
  # с strict-schema, бот исполняет их нативно, КОНТЕКСТ
  # парсинг становится fallback'ом (если модель всё-таки
  # выдала маркеры в content — парсер их тоже подхватит).
  structured_output:
    mode: "json_object"        # off | json_object | json_schema
    schema_name: "narrative_response"
    tool_choice: "required"    # auto | required | none | function:<name>
    strict_tools: true         # strict schema на tool declarations

  roles:
    # --------------------------------------------------------------------
    # narrative: основная роль — мастер игры. Тяжёлая модель, высокая
    # температура, развёрнутый system prompt.
    # --------------------------------------------------------------------
    narrative:
      # OpenAI-compatible endpoint. По умолчанию — локальная Ollama.
      api_url: "http://localhost:11434/v1"
      # Ollama игнорирует; OpenRouter/OpenAI требует настоящий ключ.
      api_key: "ollama"
      # Тег модели. Для Ollama — `ollama pull <model>` заранее.
      model: "qwen2.5:7b-instruct"
      # Файл с system prompt. По умолчанию читается
      # встроенная копия internal/prompts/narrative.md.
      # Укажите путь, чтобы переопределить без пересборки
      # бинаря (полезно для A/B-тестов новых промптов).
      system_prompt_path: ""
      # Потолок длины ответа. В JSON-режиме это 4 поля
      # (~150 слов нарратив + 3 коротких служебных блока) =
      # ~500-700 токенов. 1500 оставлено с запасом на случай
      # длинных сцен (объединение нескольких ходов в один
      # ответ) и reasoning-padding у провайдера.
      max_tokens: 1500
      # 0.7-0.9 — нарративная проза. Для сжатия лучше 0.2-0.3.
      temperature: 0.8
      # Per-role override. 0 = взять default_timeout_seconds.
      request_timeout_seconds: 120
      # context_window: жёсткий лимит input-токенов для одной
      # chat-completion request. Когда разговор растёт за
      # compaction_threshold × context_window, бот дропает
      # самые старые turn'ы (до compaction_keep_recent) и шлёт
      # уведомление. 0 = выключить компактинг.
      # Default: 32000 для мощных моделей вроде minimax-m3.
      context_window: 32000
      compaction_threshold: 0.7
      compaction_keep_recent: 5
      # max_empty_retries: сколько раз бот автоматически
      # повторит запрос, если LLM вернул 0 chars (cloud
      # Ollama иногда "зависает в размышлениях" и шлёт пустой
      # finish_reason: stop). Default 2. Увеличь до 3-4 для
      # очень flaky провайдеров.
      max_empty_retries: 2
      # empty_retry_timeout_seconds: таймаут на КАЖДЫЙ retry
      # round. Cloud Ollama медленная (50-90s на ответ), а
      # дефолтный request_timeout_seconds может быть 60s —
      # тогда retry обрывается прямо на полпути. Default =
      # request_timeout_seconds (120). Для cloud Ollama
      # рекомендую 180.
      empty_retry_timeout_seconds: 180
      # disable_thinking: отключить chain-of-thought reasoning
      # на провайдерах, которые уважают OpenAI-compat поле
      # `reasoning_effort` (Ollama /v1/chat/completions, OpenAI
      # reasoning models, xAI Grok, OpenRouter). Бот шлёт
      # `reasoning_effort: "none"`.
      # Без этого модель тратит 30-60 секунд на размышления и
      # шлёт пустые delta.content — оператор видит зависший "…".
      # Default false (провайдер сам решает).
      # Для GPT-OSS установи `reasoning_effort: "low"` —
      # GPT-OSS отвергает "none".
      disable_thinking: true
      # reasoning_effort: явный уровень (none|low|medium|high).
      # Если задан — имеет приоритет над disable_thinking.
      # Используй для моделей, которые не понимают "none"
      # (GPT-OSS) — для них передай "low".
      # По умолчанию "none" — бот уже отключает thinking
      # через disable_thinking, но явное поле делает поведение
      # прозрачным в slow.log и не зависит от default-mapping
      # в коде.
      reasoning_effort: "none"

    # --------------------------------------------------------------------
    # summary: дешёвая модель для сжатия диалогов при компактинге.
    # Когда narrative сессия длинная, summary role сжимает
    # дропнутые turn'ы в 200-400 токеновый лог фактов и
    # дописывает в state.md секцию "История (сжато)".
    # 0 = выключено (только drop, без summary).
    summary:
      api_url: "http://localhost:11434/v1"
      api_key: "ollama"
      model: "deepseek-v4-flash"
      system_prompt_path: ""
      max_tokens: 500
      temperature: 0.2
      request_timeout_seconds: 60
      context_window: 16000
      compaction_threshold: 0.5
      compaction_keep_recent: 3
      # Та же логика, что у narrative: бот шлёт
      # `reasoning_effort: "none"` в /v1/chat/completions.
      # Для summary это критично — нам нужен короткий видимый
      # результат 200-400 токенов, а не 60-секундная пауза.
      # Default true.
      disable_thinking: true

# ----------------------------------------------------------------------------
# slowlog: покадровый аудит сессии. По умолчанию выключен — при включении
# пишет JSON-streams в файл: LLM-запросы/ответы, tool calls, мутации файлов,
# входящие/исходящие сообщения. Удобно для отлова "что бот делал, пока я
# спал". Файл можно безопасно удалять в любой момент.
# ----------------------------------------------------------------------------
slowlog:
  enabled: true
  file: "slow.log"
