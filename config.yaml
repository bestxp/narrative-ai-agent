# Lazy Universe Bot — runtime configuration

messaging:
  telegram:
    # BotFather-issued token. Не коммитить в публичный репозиторий.
    token: "REPLACE_WITH_BOTFATHER_TOKEN"
    # Long-poll timeout, секунды.
    polling_timeout: 60
    # Режим парсинга: "" (plain), "MarkdownV2", "HTML".
    # HTML — авто-конвертация Markdown → <b>/<i>/<code>/<a>.
    parse_mode: "HTML"
    # Whitelist Telegram user_id. @userinfobot
    allowed_user_ids:
      - 123456789
    # Ответы бота как reply на сообщение игрока (thread).
    # Уведомления (auto-save, compaction, ошибки) идут отдельными bubble.
    reply_to_user: true

  # VK транспорт. Пропускается, если access_token/group_id пустые.
  vk:
    # Community access token. Требуемые разрешения:
    #   messages, messages.setActivity, groups
    # Создание: Manage → Settings → API usage → Create token
    access_token: ""
    # Group ID (community identifier). Обязателен для Long Poll.
    group_id: 0
    # Whitelist VK user_id.
    allowed_user_ids:
      - 0
    # Long-poll wait, секунды. VK рекомендует 25.
    polling_wait: 25

  # WebSocket chat для разработки в браузере. Запускается на отдельном
  # порту; встраиваемая React-страница + WS endpoint. Используется
  # вместо VK/Telegram при локальной разработке. Протокол JSON-envelope
  # (type+payload), bearer-token auth с заделом на production.
  wschat:
    enabled: true
    # Адрес HTTP+WS сервера. ":8090" = все интерфейсы.
    listen_addr: "127.0.0.1:8090"
    # Dev bearer token. Браузер шлёт ?token=<dev_token> на WS-апгрейд
    # и Authorization: Bearer на HTTP API. Хранить в секретах.
    dev_token: "dev-secret-change-me"
    # Multi-token allow list для production. В dev можно оставить пустым.
    allowed_tokens: []
    # Логический chat id для dev-сессии. GM ключит историю на нём.
    chat_id: "dev"

paths:
  data_root: "game-data"   # info.yaml, characters/, worlds/
  git_workdir: "."         # git add/commit/push

git:
  # true = полностью отключить git. /save, /commit, /push возвращают
  # "git отключён". Auto-save пропускается. Состояние живёт только на диске.
  disabled: false
  remote: "origin"
  branch: "master"
  commit_author: "Lazy Universe Bot"
  commit_email: "bot@lazy-universe.local"
  # true = коммиты пишутся, push/pull пропускаются (локальный режим).
  remote_disabled: false
  auto_save:
    # Каждые N freeform-ответов бот коммитит и пушит. 0 = выключено.
    after_messages: 5
  verbose_save: false

narrative:
  # Мягкий лимит слов на ответ GM. narrative.md жёсткий лимит 150.
  word_limit: 250
  language: "ru"
  # false = стрипать блок ВАЛИДАЦИЯ ПРАВИЛ из ответа. См. README.
  rules_check_block: false
  # Уведомление при компакции (дроп старых turn'ов). Отдельный bubble.
  compaction_notify: true
  compaction_notify_verbose: false

llm:
  default_timeout_seconds: 120
  # token_tracking: off | estimate | usage
  token_tracking: "estimate"
  # Дописывать "🔢 ~N tok" в конец ответа.
  include_in_reply: true

  # providers — LLM-эндпоинты. Каждый provider содержит driver +
  # url + key + context_window. Роли ссылаются на provider по имени.
  # Можно иметь несколько provider (например, локальный Ollama +
  # облачный OpenRouter) и смешивать их через роли.
  providers:
    # Основной локальный провайдер: Ollama на стандартном порту.
    # Поддерживает /v1/chat/completions openai-driver, локальные
    # модели (qwen, deepseek, llama).
    local_ollama:
      # driver: "openai" (/v1/chat/completions) |
      #         "anthropic" (/v1/messages, авто-детект ollama.com vs всё остальное)
      driver: "openai"
      # OpenAI-compatible chat completions endpoint. По умолчанию
      # Ollama. Переопределите для OpenRouter/vLLM/LM-Studio/...
      api_url: "http://localhost:11434/v1"
      # Bearer token. Ollama игнорирует; OpenAI/OpenRouter требуют
      # настоящий. Treat as a secret.
      api_key: "ollama"
      # context_window: soft cap на input-токены. При накоплении
      # истории past compaction_threshold * context_window бот
      # триггерит compaction. 0 = без компактинга.
      context_window: 32000

  roles:
    # narrative: основная роль — управляет GM, генерирует ответы.
    # Указывает provider по имени; все endpoint-настройки берутся
    # оттуда. Provider не задаёт модель — её задаёт role (или
    # модель провайдера по умолчанию в будущем).
    narrative:
      provider: local_ollama
      model: "qwen2.5:7b-instruct"
      # Путь к system prompt. "" = встроенный narrative.md.
      system_prompt_path: ""
      max_tokens: 1500
      # true = вставить prefill assistant turn "{" — заставляет модель
      # начинать ответ с JSON вместо вводного текста (для Ollama).
      use_prefill_bracket: false
      temperature: 0.8
      request_timeout_seconds: 120
      # context_window берётся из provider (32000 выше).
      # compaction_threshold / compaction_keep_recent остаются
      # per-role — разные роли могут хотеть разные политики
      # дропа старых turn'ов.
      compaction_threshold: 0.7
      compaction_keep_recent: 5
      # disable_thinking: шлёт reasoning_effort="none".
      # Без этого модель тратит 30-60с на размышления с пустым delta.content.
      disable_thinking: true
      reasoning_effort: "none"

    # summary: дешёвая модель для сжатия NPC/lore/memorise.
    # 0 = выключено (только drop, без сжатия). Тот же provider, что
    # и narrative — Ollama допускает несколько моделей на одном
    # эндпоинте. Если хотите другой провайдер для summary, добавьте
    # ещё один в providers и укажите здесь.
    summary:
      provider: local_ollama
      model: "deepseek-v4-flash"
      system_prompt_path: ""
      max_tokens: 500
      temperature: 0.2
      request_timeout_seconds: 60
      compaction_threshold: 0.5
      compaction_keep_recent: 3
      disable_thinking: true

slowlog:
  enabled: true
  file: "slow.log"

# Health server: k8s livenessProbe / readinessProbe target.
# Disabled by default. Set to e.g. ":8080" inside a container to
# expose /healthz (always 200) and /readyz (200 when at least one
# transport is connected).
health:
  listen_addr: ""
