# ============================================================================
# Lazy Universe Bot — runtime configuration
# ----------------------------------------------------------------------------
# Каждая секция снабжена комментарием, описывающим её назначение. Парсер
# игнорирует YAML-комментарии; подсказки нужны только человеку, который
# правит этот файл.
# ============================================================================

# ----------------------------------------------------------------------------
# messaging: транспорты, через которые бот общается с игроком.
# Сейчас активен только Telegram, но архитектура допускает подключение
# Discord / web / CLI без правок в коде — достаточно добавить sibling-поле
# в MessagingConfig (см. internal/config/config.go).
# ----------------------------------------------------------------------------
messaging:
  telegram:
    # BotFather-issued token. Секрет, не коммитить в публичный репозиторий.
    token: "REPLACE_WITH_BOTFATHER_TOKEN"
    # Long-poll длительность для GetUpdates, секунды. 30-90 — комфортный диапазон.
    polling_timeout: 60
    # Режим парсинга сообщений: "" (plain), "Markdown", "MarkdownV2", "HTML".
    parse_mode: "Markdown"
    # Whitelist Telegram user_id. Сообщения от всех, кто не в списке, дропаются.
    allowed_user_ids:
      - 123456789

# ----------------------------------------------------------------------------
# paths: где бот хранит данные и в каком каталоге выполняет git-команды.
# Относительные пути резолвятся относительно директории этого YAML-файла.
# ----------------------------------------------------------------------------
paths:
  data_root: "game-data"   # Корень: info.md, characters/, worlds/
  git_workdir: "."         # Где запускать git add/commit/push

# ----------------------------------------------------------------------------
# git: параметры локального коммита и синхронизации с remote. Скилл требует
# "git add -A && commit && pull --rebase && push" после каждого обслуживания.
# ----------------------------------------------------------------------------
git:
  remote: "origin"                  # Имя remote
  branch: "master"                  # Рабочая ветка
  commit_author: "Lazy Universe Bot"
  commit_email: "bot@lazy-universe.local"
  # remote_disabled: true — локальный режим: коммиты пишутся, push/pull пропускаются.
  # Удобно для разработки на одной машине и для бэкапа без облака.
  # По умолчанию false (push включён — канонический flow lazy-universe).
  remote_disabled: false

# ----------------------------------------------------------------------------
# narrative: поведенческая обёртка GM — лимит слов и язык ответов.
# ----------------------------------------------------------------------------
narrative:
  word_limit: 350   # Мягкий лимит на длину ответа (правило "~350 слов")
  language: "ru"    # Язык, на котором GM пишет

# ----------------------------------------------------------------------------
# llm: реестр LLM-ролей. Каждая роль — отдельная задача со своей моделью
# и system prompt. Сейчас активна только "narrative" (GM); позже появятся
# "summary" (дешёвая модель для сжатия NPC-файлов), "classification"
# (выбор tool'а) и т.д. — для каждой свой набор параметров.
# ----------------------------------------------------------------------------
llm:
  # Default timeout для всех ролей, которые не указали свой.
  default_timeout_seconds: 120

  roles:
    # --------------------------------------------------------------------
    # narrative: основная роль — мастер игры. Тяжёлая модель, высокая
    # температура, развёрнутый system prompt.
    # --------------------------------------------------------------------
    narrative:
      # OpenAI-compatible endpoint. По умолчанию — локальная Ollama.
      api_url: "http://localhost:11434/v1"
      # Ollama игнорирует; OpenRouter/OpenAI требует настоящий ключ.
      api_key: "ollama"
      # Тег модели. Для Ollama — `ollama pull <model>` заранее.
      model: "qwen2.5:7b-instruct"
      # Файл с system prompt, читается один раз на старте.
      system_prompt_path: "prompts/narrative.md"
      # Потолок длины ответа. Для нарратива 1200-2000 — комфортно.
      max_tokens: 1500
      # 0.7-0.9 — нарративная проза. Для сжатия лучше 0.2-0.3.
      temperature: 0.8
      # Per-role override. 0 = взять default_timeout_seconds.
      request_timeout_seconds: 120

    # --------------------------------------------------------------------
    # summary: дешёвая фоновая модель для сжатия NPC-файлов, lore.md,
    # memory.md. Не доверяем дорогой модели рутину.
    # Зарезервировано — ещё не используется; раскомментировать, когда
    # появится вызов из usecase/maintenance.go.
    # --------------------------------------------------------------------
    # summary:
    #   api_url: "http://localhost:11434/v1"
    #   api_key: "ollama"
    #   model: "qwen2.5:1.5b-instruct"
    #   system_prompt_path: "prompts/summary.md"
    #   max_tokens: 500
    #   temperature: 0.3
